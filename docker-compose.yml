services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: smistress
      POSTGRES_PASSWORD: smistress
      POSTGRES_DB: smistress
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  falkordb:
    image: falkordb/falkordb:latest
    ports: ["6379:6379"]
    volumes: ["falkordata:/data"]
volumes:
  pgdata:
  falkordata:
